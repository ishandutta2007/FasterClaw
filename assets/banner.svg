<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d"/>
      <stop offset="50%" stop-color="#070b19"/>
      <stop offset="100%" stop-color="#0f051d"/>
    </linearGradient>

    <!-- Accent Gradient 1 (Purple-Pink) -->
    <linearGradient id="accentGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3366"/>
      <stop offset="100%" stop-color="#ba26f0"/>
    </linearGradient>

    <!-- Accent Gradient 2 (Cyan-Blue) -->
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle Glow Filter -->
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="url(#bgGrad)"/>

  <!-- Decorative Background Grid / Tech elements -->
  <g opacity="0.07">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350 M 0,400 L 1200,400" stroke="#ffffff" stroke-width="1"/>
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450 M 800,0 L 800,450 M 900,0 L 900,450 M 1000,0 L 1000,450 M 1100,0 L 1100,450" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Abstract circuit/network lines on the sides -->
  <g opacity="0.25" stroke="url(#accentGrad2)" stroke-width="1.5" fill="none">
    <path d="M-50,225 L150,225 L200,175 L350,175 L380,205" />
    <circle cx="380" cy="205" r="4" fill="#00f2fe" />
    <path d="M1250,225 L1050,225 L1000,275 L850,275 L820,245" />
    <circle cx="820" cy="245" r="4" fill="#00f2fe" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="200" cy="150" r="120" fill="#ff3366" opacity="0.15" filter="url(#glow)"/>
  <circle cx="950" cy="300" r="150" fill="#00f2fe" opacity="0.15" filter="url(#glow)"/>
  <circle cx="600" cy="225" r="180" fill="#ba26f0" opacity="0.1" filter="url(#glow)"/>

  <!-- Logo/Icon representation: Stylized Lobster Claw / Speed Lines in Hexagon -->
  <g transform="translate(600, 120)">
    <!-- Outer Hexagon -->
    <polygon points="0,-65 56,-32 56,32 0,65 -56,32 -56,-32" fill="none" stroke="url(#accentGrad1)" stroke-width="3" filter="url(#subtleGlow)"/>
    <polygon points="0,-55 47,-27 47,27 0,55 -47,27 -47,-27" fill="none" stroke="url(#accentGrad2)" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Stylized Lobster Claw representation -->
    <path d="M-20,-10 C-35,-25 -30,-45 -10,-40 C-5,-38 -3,-30 -8,-25 C0,-35 15,-30 12,-15 C10,-5 0,10 -15,15 C-25,18 -30,10 -30,0 Z" fill="url(#accentGrad1)" opacity="0.95"/>
    <path d="M20,-10 C35,-25 30,-45 10,-40 C5,-38 3,-30 8,-25 C0,-35 -15,-30 -12,-15 C-10,-5 0,10 15,15 C25,18 30,10 30,0 Z" fill="url(#accentGrad1)" opacity="0.95"/>
    <path d="M-10,15 L0,35 L10,15 Z" fill="url(#accentGrad2)"/>
    <circle cx="0" cy="0" r="8" fill="#ffffff" filter="url(#subtleGlow)"/>
  </g>

  <!-- Title & Subtitle -->
  <g text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    <!-- Brand Title -->
    <text x="600" y="240" font-size="54" font-weight="900" letter-spacing="4" fill="#ffffff">
      FASTERCLAW
    </text>
    
    <!-- Glow behind Title for premium feel -->
    <text x="600" y="240" font-size="54" font-weight="900" letter-spacing="4" fill="none" stroke="url(#accentGrad1)" stroke-width="2" opacity="0.8" filter="url(#subtleGlow)">
      FASTERCLAW
    </text>

    <!-- Subtitle / Tagline -->
    <text x="600" y="278" font-size="18" font-weight="500" letter-spacing="2" fill="#a0aec0">
      HIGH-PERFORMANCE, PRIVACY-FIRST GO AI AGENT
    </text>
  </g>

  <!-- Feature Pill Tags -->
  <g transform="translate(225, 330)" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="1">
    <!-- Pill 1: Lightweight -->
    <g transform="translate(0, 0)">
      <rect width="180" height="36" rx="18" fill="#171923" stroke="#2d3748" stroke-width="1.5"/>
      <rect width="180" height="36" rx="18" fill="none" stroke="url(#accentGrad1)" stroke-width="1.5" opacity="0.3"/>
      <text x="90" y="22" text-anchor="middle" fill="#ff3366">⚡ 99% LESS MEMORY</text>
    </g>

    <!-- Pill 2: High Performance / Go -->
    <g transform="translate(205, 0)">
      <rect width="170" height="36" rx="18" fill="#171923" stroke="#2d3748" stroke-width="1.5"/>
      <rect width="170" height="36" rx="18" fill="none" stroke="url(#accentGrad2)" stroke-width="1.5" opacity="0.3"/>
      <text x="85" y="22" text-anchor="middle" fill="#00f2fe">🐹 GO-POWERED SPEED</text>
    </g>

    <!-- Pill 3: Self-Hosted / Private -->
    <g transform="translate(400, 0)">
      <rect width="180" height="36" rx="18" fill="#171923" stroke="#2d3748" stroke-width="1.5"/>
      <rect width="180" height="36" rx="18" fill="none" stroke="url(#accentGrad1)" stroke-width="1.5" opacity="0.3"/>
      <text x="90" y="22" text-anchor="middle" fill="#ba26f0">🔒 PRIVACY-FIRST &amp; LOCAL</text>
    </g>

    <!-- Pill 4: Universal Portability -->
    <g transform="translate(605, 0)">
      <rect width="150" height="36" rx="18" fill="#171923" stroke="#2d3748" stroke-width="1.5"/>
      <rect width="150" height="36" rx="18" fill="none" stroke="url(#accentGrad2)" stroke-width="1.5" opacity="0.3"/>
      <text x="75" y="22" text-anchor="middle" fill="#4facfe">🌍 RUNS ANYWHERE</text>
    </g>
  </g>

</svg>
